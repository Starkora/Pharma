name: SonarCloud Analysis

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  sonar-backend:
    name: Backend (Java)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0  # Necesario para análisis correcto de Sonar

      - name: Configurar Java 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Crear application.properties desde ejemplo
        run: |
          cp backend/src/main/resources/application.properties.example \
             backend/src/main/resources/application.properties
        working-directory: ${{ github.workspace }}

      - name: Build y tests con JaCoCo
        run: mvn -B verify --no-transfer-progress
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:h2:mem:testdb
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
          SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect

      - name: Análisis SonarCloud (Backend)
        uses: SonarSource/sonarcloud-github-action@4006f663ecaf1f8093e8e4abb9227f6041f52216
        with:
          projectBaseDir: backend
          args: >
            -Dsonar.organization=starkora
            -Dsonar.projectKey=Starkora_PharmaSys_Backend
            -Dsonar.projectName="PharmaSys Backend"
            -Dsonar.sources=src/main/java
            -Dsonar.tests=src/test/java
            -Dsonar.java.binaries=target/classes
            -Dsonar.java.test.binaries=target/test-classes
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
            -Dsonar.exclusions=**/config/**,**/*Application.java
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sonar-frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci --ignore-scripts
        working-directory: frontend

      - name: Ejecutar tests con cobertura
        run: npm run test -- --no-watch --no-progress --browsers=ChromeHeadless --code-coverage
        working-directory: frontend
        continue-on-error: true  # No bloquea si no hay tests aún

      - name: Análisis SonarCloud (Frontend)
        uses: SonarSource/sonarcloud-github-action@4006f663ecaf1f8093e8e4abb9227f6041f52216
        with:
          projectBaseDir: frontend
          args: >
            -Dsonar.organization=starkora
            -Dsonar.projectKey=Starkora_PharmaSys_Frontend
            -Dsonar.projectName="PharmaSys Frontend"
            -Dsonar.sources=src
            -Dsonar.exclusions=**/node_modules/**,**/*.spec.ts,**/environments/**
            -Dsonar.tests=src
            -Dsonar.test.inclusions=**/*.spec.ts
            -Dsonar.javascript.lcov.reportPaths=coverage/pharmasys-frontend/lcov.info
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
